  <script>
    (function() {
      var THEME_KEY = "jockcloud_theme";
      var savedTheme = localStorage.getItem(THEME_KEY) || "auto";
      var actualTheme;
      if (savedTheme === "auto") {
        actualTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      } else {
        actualTheme = savedTheme;
      }
      if (actualTheme === "dark") {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>
  <script src="/js/theme.js"></script>
  <script>
    document.documentElement.classList.add("menu-permission-init");
    (function applyMenuInitFromCache() {
      const ALL_MENU_KEYS = ["files", "transfer", "users", "permissions", "quota", "mounts", "sync", "monitor", "settings"];
      let allowedMenus = ["files", "transfer"];
      let mobileVisibleMenus = ALL_MENU_KEYS.slice();
      try {
        const allowedRaw = JSON.parse(localStorage.getItem("drive_allowed_menus_cache_v1") || "[]");
        const mobileRaw = JSON.parse(localStorage.getItem("drive_mobile_visible_menus_cache_v1") || "[]");
        if (Array.isArray(allowedRaw) && allowedRaw.length > 0) {
          allowedMenus = allowedRaw.filter((key) => ALL_MENU_KEYS.includes(String(key)));
        }
        if (Array.isArray(mobileRaw) && mobileRaw.length > 0) {
          mobileVisibleMenus = mobileRaw.filter((key) => ALL_MENU_KEYS.includes(String(key)));
        }
      } catch (_error) {}
      const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
      const renderable = isMobile
        ? allowedMenus.filter((key) => mobileVisibleMenus.includes(key))
        : allowedMenus.slice();
      if (!renderable.includes("files")) {
        renderable.unshift("files");
      }
      if (!renderable.includes("transfer")) {
        renderable.splice(Math.min(1, renderable.length), 0, "transfer");
      }
      const selectors = renderable.map((key) => {
        if (key === "transfer") return '#mainNav #uploadTasksNavBtn';
        return `#mainNav .primary-nav-item[data-view="${key}"]`;
      });
      const styleEl = document.createElement("style");
      styleEl.id = "menuPermissionInitStyle";
      styleEl.textContent = `html.menu-permission-init #mainNav .primary-nav-item{display:none!important;}${selectors.join(",")}{display:flex!important;}`;
      document.head.appendChild(styleEl);
    })();
    if (window.matchMedia && window.matchMedia("(max-width: 768px)").matches) {
      document.documentElement.classList.add("mobile-secondary-init");
    }
  </script>

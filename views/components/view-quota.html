                  <div style="font-size:12px; color:#666; margin-bottom:10px;">

                  </div>
                  <div style="font-size:12px; color:#e67e22; margin-bottom:10px;">
                    NFS 挂载目录必须具备读、写、删权限才可以添加；已有文件数据的存储盘不能禁用、移除或修改路径。

                      </div>
                    </form>
                  </div>

                    <button type="button" id="quotaSearchBtn" class="btn-sm" style="background:#00abff; color:#fff; border:none;"><i class="fa-solid fa-magnifying-glass"></i> 搜索</button>
                    <button type="button" id="quotaClearSearchBtn" class="btn-sm" style="display:none;">清除</button>
                  </div>
                </div>
                <div class="admin-table-panel">

                    <table class="data-table" id="quotaTable">

                         </tr>
                       </thead>
                       <tbody></tbody>
                    </table>
                  </div>

                      <span id="quotaPageInfo">1 / 1</span>
                      <button type="button" id="quotaNextPageBtn">下一页</button>

                        <option value="100">100 / 页</option>
                      </select>
                    </div>
                  </div>
                </div>
              </div>

    <div id="mountModal" class="modal-overlay">
    <div class="modal">
      <h3 id="mountModalTitle">添加挂载</h3>
      <form id="mountForm">
        <input type="hidden" id="mountEditId" />
        <div class="form-group">
          <label>挂载名称</label>
          <input type="text" id="mountName" required placeholder="如: 阿里云OSS备份" />
        </div>
        <div class="form-group">
          <label>存储类型</label>
          <select id="mountType">
            <option value="aliyun">阿里云 OSS</option>
            <option value="qiniu">七牛云 Kodo</option>
            <option value="tencent">腾讯云 COS</option>
          </select>
        </div>
        <div class="form-group">
          <label>AccessKey / SecretId</label>
          <input type="text" id="mountAk" required />
        </div>
        <div class="form-group">
          <label>SecretKey / SecretKey</label>
          <input type="password" id="mountSk" required />
        </div>
        <div class="form-group">
          <label>Bucket (存储桶名)</label>
          <input type="text" id="mountBucket" required />
        </div>
        <div class="form-group">
          <label>Endpoint / Region</label>
          <input type="text" id="mountEndpoint" placeholder="如: oss-cn-hangzhou.aliyuncs.com" required />
        </div>
        <div class="form-group">
          <label>文件存储列表(JSON，可选)</label>
          <textarea id="mountStorageList" rows="4" placeholder='例如: [{"name":"a.jpg","path":"/a.jpg"}]'></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-sm" id="cancelMountModalBtn">取消</button>
          <button type="submit" class="btn-sm" style="background:#165dff; color:#fff; border:none;">保存</button>
        </div>
      </form>
    </div>
  </div>

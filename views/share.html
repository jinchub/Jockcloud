<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>分享内容 - JockCloud</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/fontawesome/css/all.min.css">
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #ffffff; color: #333; min-height: 100vh; }
    .share-container { width: 100%; max-width: 100vw; margin: 0 auto;margin-top: 64px;border-top: 1px solid #f9f9f9; }
    .panel { background: #fff; padding: 20px 40px; }
    .login-header {background: #fff;}
    .header { display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
    .header-right { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    .share-user { display: flex; align-items: baseline; gap: 0px; font-size: 12px; color: #1d1d1d; }
    .user-icon { width: 20px; text-align: center; color: #165dff; }
    .title { font-size: 18px; font-weight: bold; margin: 0; word-break: break-all; color: #333; }
    .expire { font-size: 12px; color: #bbbbbb; }
    .tip { margin-top: 16px; padding: 14px 16px; border-radius: 10px; font-size: 14px; background: #f9f9f9; color: #666; position: relative; padding-right: 40px; }
    .tip.error { background: #fff2f0; color: #f53f3f; }
    .tip-close { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #999; font-size: 18px; line-height: 1; padding: 4px; border-radius: 4px; transition: all 0.2s; }
    .tip-close:hover { color: #333; background: rgba(0, 0, 0, 0.05); }
    .verify-box { margin-top: 24px; max-width: 400px; }
    .verify-box input { width: 100%; height: 48px; border: 0; background: #f9f9f9; border-radius: 10px; padding: 0 16px; font-size: 14px; outline: none; transition: all 0.3s; }
    .verify-box input:focus { background: #f0f7ff; }
    .btn { height: 28px; border: 0; width: max-content;word-break: keep-all;border-radius: 10px; cursor: pointer; padding: 6px 10px; font-size: 12px; font-weight: 600; transition: all 0.3s;}
    .btn.primary { background: #165dff; color: #fff; }
    .btn.primary:hover { background: #4080ff; }
    .btn.ghost { background: unset;color: rgb(0 78 255 / 80%); border: 0; }
    .btn.ghost:hover { color: #004cff;}
    .btn[disabled], .btn.is-disabled { background: #f2f3f5; color: #bfc4cd; cursor: not-allowed; pointer-events: none; }
    .btn.ghost[disabled], .btn.ghost.is-disabled { color: #bfc4cd; }
    .btn.ghost[disabled]:hover, .btn.ghost.is-disabled:hover { color: #bfc4cd; }
    .verify-actions { margin-top: 16px; }
    .breadcrumb { margin-top: 20px; font-size: 14px; color: #666; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .breadcrumb a { color: #165dff; text-decoration: none; transition: color 0.3s; }
    .breadcrumb a:hover { color: #4080ff; }
    .entry-list { margin-top: 16px; border-radius: 12px; overflow: hidden; background: #fff; }
    .entry-header, .entry-row { display: grid; grid-template-columns: 1fr 140px 160px 140px; align-items: center; gap: 12px; padding: 10px 10px; }
    .entry-header { background: #f9f9f9; color: #111111; font-size: 14px; font-weight: 600; }
    .entry-row { border-top: 1px solid #f7f8fa; font-size: 13px; transition: background 0.2s; }
    .entry-row:first-child { border-top: 0; }
    .entry-row:hover { background-color: #eef7ff; }
    .entry-name { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .entry-link { color: #333; text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: color 0.2s; }
    .entry-link:hover { color: #165dff; }
    .entry-link.folder { color: #165dff; }
    .entry-size, .entry-time { color: #666; font-size: 12px; }
    .entry-actions {display: flex;gap: 10px;justify-content: flex-end;align-items: center;}
    .entry-meta-mobile { display: none; }
    .desktop-only { display: block; }
    .file-icon { width: 20px; text-align: center; font-size: 16px; flex-shrink: 0; }
    .file-folder { color: #f5a623; }
    .file-image { color: #52c41a; }
    .file-video { color: #722ed1; }
    .file-audio { color: #eb2f96; }
    .file-pdf { color: #f5222d; }
    .file-word { color: #2f54eb; }
    .file-excel { color: #52c41a; }
    .file-ppt { color: #fa541c; }
    .file-text { color: #8c8c8c; }
    .file-zip { color: #faad14; }
    .file-program { color: #1890ff; }
    .file-font { color: #8c8c8c; }
    .file-code-html { color: #e44d26; }
    .file-code-css { color: #264de4; }
    .file-code-js { color: #f7df1e; }
    .file-code-ts { color: #3178c6; }
    .file-code-react { color: #61dafb; }
    .file-code-vue { color: #42b883; }
    .file-code-json { color: #8c8c8c; }
    .file-code-py { color: #3776ab; }
    .file-code-java { color: #e76f00; }
    .file-code-php { color: #777bb4; }
    .file-code-sql { color: #e48900; }
    .file-code-shell { color: #4eaa25; }
    .file-code-xml { color: #8c8c8c; }
    .file-code-config { color: #8c8c8c; }
    .file-code-cpp { color: #00599c; }
    .file-code-cs { color: #68217a; }
    .file-code { color: #8c8c8c; }
    .file-psd { color: #31a8ff; }
    .file-default { color: #8c8c8c; }
    .empty { padding: 40px; color: #8a8f99; font-size: 14px; text-align: center; }
    .footer-right { margin-top: 24px; text-align: right; color: #999; font-size: 12px; }
    @media (max-width: 760px) {
      .login-header {padding: 0 15px;}
      .panel { padding: 20px 15px; }
      .entry-header { display: none; }
      .entry-row { 
        display: flex; 
        align-items: center; 
        gap: 8px; 
        padding: 10px 10px;
        flex-wrap: nowrap;
      }
      .entry-name { 
        flex: 1; 
        min-width: 0; 
      }
      .entry-meta-mobile { 
        display: flex; 
        align-items: center; 
        gap: 4px; 
        color: #666; 
        font-size: 11px; 
        flex-shrink: 0;
      }
      .entry-divider { color: #ddd; }
      .desktop-only { display: none; }
      .entry-actions { 
        justify-content: flex-end; 
        flex-shrink: 0;
        margin-top: 0;
        width: 40px;
      }
      .header-right { gap: 12px; }
    }
    @media (min-width: 761px) {
      .entry-meta-mobile { display: none; }
      .desktop-only { display: block; }
    }
  </style>
</head>
<body>
  <!-- 顶部导航 -->
  <header class="login-header">
    <div class="logo-area">
      <i class="fa-solid fa-cloud logo-icon"></i>
      <span class="logo-text">JockCloud</span>
    </div>
    <div class="header-links">
      <a href="/" target="_blank">登录网盘</a>
    </div>
  </header>

  <!-- 主体区域 -->
  <div class="share-container">
    <div class="panel">
      <div class="header">
        <h1 class="title" id="shareTitle">分享内容</h1>
        <div class="header-right">
          <div class="share-user" id="shareUser" style="display:none;">
            <i class="fa-solid fa-user user-icon"></i>
            <span id="shareUserName"></span>
          </div>
          <div class="expire" id="shareExpire">有效期：-</div>
        </div>
      </div>
      <div id="statusTip" class="tip" style="display:none;"></div>
      <div id="verifyBox" class="verify-box" style="display:none;">
        <input id="verifyInput" type="text" maxlength="12" placeholder="请输入提取码" />
        <div class="verify-actions">
          <button class="btn primary" id="verifyBtn">验证提取码</button>
        </div>
      </div>
      <div id="contentBox" style="display:none;">
        <div class="breadcrumb" id="breadcrumb"></div>
        <div class="entry-list">
          <div class="entry-header">
            <div>名称</div>
            <div>大小</div>
            <div>日期</div>
            <div style="text-align:right;padding-right: 10px;">操作</div>
          </div>
          <div id="entryList"></div>
        </div>
      </div>
    </div>
  </div>
  <script>
    const state = {
      shareCode: "",
      token: "",
      needPassword: false,
      root: null,
      currentFolderId: null,
      rootFolderId: null,
      pathStack: [],
      shareUser: null,
      folderDownloadableCache: new Map()
    };

    const shareTitle = document.getElementById("shareTitle");
    const shareExpire = document.getElementById("shareExpire");
    const shareUser = document.getElementById("shareUser");
    const shareUserName = document.getElementById("shareUserName");
    const statusTip = document.getElementById("statusTip");
    const verifyBox = document.getElementById("verifyBox");
    const verifyInput = document.getElementById("verifyInput");
    const verifyBtn = document.getElementById("verifyBtn");
    const contentBox = document.getElementById("contentBox");
    const breadcrumb = document.getElementById("breadcrumb");
    const entryList = document.getElementById("entryList");

    const showTip = (message, isError = false) => {
      statusTip.textContent = message || "";
      statusTip.className = isError ? "tip error" : "tip";
      statusTip.style.display = message ? "block" : "none";
      
      if (message) {
        const existingCloseBtn = statusTip.querySelector(".tip-close");
        if (!existingCloseBtn) {
          const closeBtn = document.createElement("span");
          closeBtn.className = "tip-close";
          closeBtn.innerHTML = "&times;";
          closeBtn.onclick = () => {
            statusTip.style.display = "none";
          };
          statusTip.appendChild(closeBtn);
        }
      }
    };

    const formatSize = (size) => {
      const value = Number(size || 0);
      if (!value) return "-";
      if (value < 1024) return `${value} B`;
      if (value < 1024 * 1024) return `${(value / 1024).toFixed(1)} KB`;
      if (value < 1024 * 1024 * 1024) return `${(value / 1024 / 1024).toFixed(1)} MB`;
      return `${(value / 1024 / 1024 / 1024).toFixed(1)} GB`;
    };

    const formatDate = (value) => {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "-";
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      const h = String(date.getHours()).padStart(2, "0");
      const mi = String(date.getMinutes()).padStart(2, "0");
      return `${y}-${m}-${d} ${h}:${mi}`;
    };

    const getFileIcon = (entry) => {
      if (entry.type === "folder") return "fa-solid fa-folder file-folder";
      const name = (entry.name || "").toLowerCase();
      if (name.endsWith(".psd")) return "file-psd";
      if (name.endsWith(".jpg") || name.endsWith(".jpeg") || name.endsWith(".png") || name.endsWith(".gif") || name.endsWith(".bmp") || name.endsWith(".webp")) return "fa-solid fa-image file-image";
      if (name.endsWith(".mp4") || name.endsWith(".mkv") || name.endsWith(".avi") || name.endsWith(".mov")) return "fa-solid fa-film file-video";
      if (name.endsWith(".mp3") || name.endsWith(".wav") || name.endsWith(".flac") || name.endsWith(".m4a")) return "fa-solid fa-music file-audio";
      if (name.endsWith(".pdf")) return "fa-solid fa-file-pdf file-pdf";
      if (name.endsWith(".doc") || name.endsWith(".docx")) return "fa-solid fa-file-word file-word";
      if (name.endsWith(".xls") || name.endsWith(".xlsx")) return "fa-solid fa-file-excel file-excel";
      if (name.endsWith(".ppt") || name.endsWith(".pptx")) return "fa-solid fa-file-powerpoint file-ppt";
      if (name.endsWith(".txt") || name.endsWith(".md")) return "fa-solid fa-file-lines file-text";
      if (name.endsWith(".zip") || name.endsWith(".rar") || name.endsWith(".7z") || name.endsWith(".tar") || name.endsWith(".gz")) return "fa-solid fa-file-zipper file-zip";
      if (name.endsWith(".exe") || name.endsWith(".msi") || name.endsWith(".bat") || name.endsWith(".cmd") || name.endsWith(".com")) return "fa-brands fa-windows file-program";
      if (name.endsWith(".ttf") || name.endsWith(".otf") || name.endsWith(".woff") || name.endsWith(".woff2")) return "fa-solid fa-font file-font";
      if (name.endsWith(".html") || name.endsWith(".htm")) return "fa-brands fa-html5 file-code-html";
      if (name.endsWith(".css") || name.endsWith(".scss") || name.endsWith(".less")) return "fa-brands fa-css3-alt file-code-css";
      if (name.endsWith(".js") || name.endsWith(".mjs") || name.endsWith(".cjs")) return "fa-brands fa-js file-code-js";
      if (name.endsWith(".ts") || name.endsWith(".tsx")) return "fa-solid fa-code file-code-ts";
      if (name.endsWith(".jsx")) return "fa-brands fa-react file-code-react";
      if (name.endsWith(".vue")) return "fa-brands fa-vuejs file-code-vue";
      if (name.endsWith(".json")) return "fa-solid fa-code file-code-json";
      if (name.endsWith(".py")) return "fa-brands fa-python file-code-py";
      if (name.endsWith(".java")) return "fa-brands fa-java file-code-java";
      if (name.endsWith(".php")) return "fa-brands fa-php file-code-php";
      if (name.endsWith(".sql")) return "fa-solid fa-database file-code-sql";
      if (name.endsWith(".sh") || name.endsWith(".bash") || name.endsWith(".zsh") || name.endsWith(".ps1")) return "fa-solid fa-terminal file-code-shell";
      if (name.endsWith(".xml")) return "fa-solid fa-code file-code-xml";
      if (name.endsWith(".yaml") || name.endsWith(".yml") || name.endsWith(".toml") || name.endsWith(".ini")) return "fa-solid fa-sliders file-code-config";
      if (name.endsWith(".c") || name.endsWith(".cpp") || name.endsWith(".cc") || name.endsWith(".h") || name.endsWith(".hpp")) return "fa-solid fa-microchip file-code-cpp";
      if (name.endsWith(".cs")) return "fa-solid fa-hashtag file-code-cs";
      if (name.endsWith(".go") || name.endsWith(".rs") || name.endsWith(".swift") || name.endsWith(".kt")) return "fa-solid fa-file-code file-code";
      return "fa-solid fa-file file-default";
    };

    const getTokenKey = () => `jc_share_token_${state.shareCode}`;

    const requestJson = async (url, options = {}) => {
      const headers = { ...(options.headers || {}) };
      if (state.token) {
        headers["x-share-token"] = state.token;
      }
      const response = await fetch(url, { ...options, headers });
      const data = await response.json().catch(() => ({}));
      return { response, data };
    };

    const renderBreadcrumb = () => {
      if (!state.root) {
        breadcrumb.innerHTML = "";
        return;
      }
      breadcrumb.innerHTML = "";
      
      const goBack = async () => {
        if (state.pathStack.length <= 1) {
          state.currentFolderId = null;
          state.pathStack = [];
          renderBreadcrumb();
          renderEntries([{
            id: state.rootFolderId,
            type: "folder",
            name: state.root && state.root.name ? state.root.name : "目录",
            updatedAt: state.root && state.root.updatedAt ? state.root.updatedAt : null,
            createdAt: state.root && state.root.createdAt ? state.root.createdAt : null
          }]);
        } else {
          state.pathStack = state.pathStack.slice(0, -1);
          const parentItem = state.pathStack[state.pathStack.length - 1];
          await loadFolderEntries(parentItem.id);
        }
      };
      
      if (state.pathStack.length > 0 && state.root.type !== "file") {
        const backLink = document.createElement("a");
        backLink.href = "#";
        backLink.textContent = "← 返回";
        backLink.onclick = async (event) => {
          event.preventDefault();
          await goBack();
        };
        breadcrumb.appendChild(backLink);
        
        const sep = document.createElement("span");
        sep.textContent = " / ";
        breadcrumb.appendChild(sep);
      }
      
      if (Array.isArray(state.pathStack) && state.pathStack.length > 0) {
        state.pathStack.forEach((item, index) => {
          if (index > 0) {
            const sep = document.createElement("span");
            sep.textContent = "/";
            breadcrumb.appendChild(sep);
          }
          if (index === state.pathStack.length - 1) {
            const text = document.createElement("span");
            text.textContent = item.name;
            breadcrumb.appendChild(text);
            return;
          }
          const link = document.createElement("a");
          link.href = "#";
          link.textContent = item.name;
          link.onclick = async (event) => {
            event.preventDefault();
            state.pathStack = state.pathStack.slice(0, index + 1);
            await loadFolderEntries(item.id);
          };
          breadcrumb.appendChild(link);
        });
      }
    };

    const buildDownloadUrl = (type, id) => {
      const base = type === "folder"
        ? `/api/share/${state.shareCode}/download/folder/${id}`
        : `/api/share/${state.shareCode}/download/file/${id}`;
      if (!state.token) return base;
      return `${base}?token=${encodeURIComponent(state.token)}`;
    };

    const getFolderDownloadable = async (folderId) => {
      const targetFolderId = Number(folderId) || 0;
      if (!targetFolderId) return false;
      if (state.folderDownloadableCache.has(targetFolderId)) {
        return await state.folderDownloadableCache.get(targetFolderId);
      }
      const request = (async () => {
        const { response, data } = await requestJson(`/api/share/${state.shareCode}/folder/${targetFolderId}/size`);
        if (!response.ok) {
          throw new Error(data.message || "检查目录状态失败");
        }
        return Number(data.fileCount || 0) > 0;
      })();
      state.folderDownloadableCache.set(targetFolderId, request);
      try {
        const downloadable = await request;
        state.folderDownloadableCache.set(targetFolderId, downloadable);
        return downloadable;
      } catch (error) {
        state.folderDownloadableCache.delete(targetFolderId);
        throw error;
      }
    };

    const syncFolderDownloadButtonState = async (button, folderId) => {
      if (!button) return;
      try {
        const downloadable = await getFolderDownloadable(folderId);
        if (!button.isConnected) return;
        button.disabled = !downloadable;
        button.title = downloadable ? "" : "空目录不可下载";
      } catch (error) {
        if (!button.isConnected) return;
        button.disabled = false;
        button.title = "";
      }
    };

    const renderEntries = (entries) => {
      entryList.innerHTML = "";
      if (!Array.isArray(entries) || entries.length === 0) {
        entryList.innerHTML = `<div class="empty">暂无内容</div>`;
        return;
      }
      entries
        .slice()
        .sort((a, b) => {
          if (a.type !== b.type) return a.type === "folder" ? -1 : 1;
          return String(a.name || "").localeCompare(String(b.name || ""));
        })
        .forEach((item) => {
          const row = document.createElement("div");
          row.className = "entry-row";
          const isFolder = item.type === "folder";
          const iconClass = getFileIcon(item);
          const timeText = formatDate(item.updatedAt || item.createdAt);
          row.innerHTML = `
            <div class="entry-name">
              <i class="file-icon ${iconClass}"></i>
              ${isFolder ? `<a href="#" class="entry-link folder">${item.name || ""}</a>` : `<span class="entry-link" style="color: #1d2129; cursor: default;">${item.name || ""}</span>`}
            </div>
            <div class="entry-size desktop-only">${isFolder ? "-" : formatSize(item.size)}</div>
            <div class="entry-time desktop-only">${timeText}</div>
            <div class="entry-meta-mobile">
              <span class="entry-size">${isFolder ? "-" : formatSize(item.size)}</span>
              <span class="entry-divider">·</span>
              <span class="entry-time">${timeText}</span>
            </div>
            <div class="entry-actions">
              <button class="btn ghost" data-download="1">${isFolder ? "下载" : "下载"}</button>
            </div>
          `;
          if (isFolder) {
            const openFolder = async (event) => {
              if (event.target.closest(".entry-actions")) return;
              event.preventDefault();
              if (state.currentFolderId === null) {
                state.pathStack = [{ id: Number(item.id), name: item.name || "目录" }];
              } else {
                state.pathStack.push({ id: Number(item.id), name: item.name || "目录" });
              }
              await loadFolderEntries(item.id);
            };
            row.querySelector(".entry-link").onclick = openFolder;
            row.onclick = openFolder;
            row.style.cursor = "pointer";
          }
          const downloadBtn = row.querySelector("[data-download='1']");
          if (isFolder) {
            syncFolderDownloadButtonState(downloadBtn, item.id);
          }
          downloadBtn.onclick = async () => {
            if (downloadBtn.disabled) return;
            if (isFolder) {
              try {
                const downloadable = await getFolderDownloadable(item.id);
                if (!downloadable) {
                  downloadBtn.disabled = true;
                  downloadBtn.title = "空目录不可下载";
                  showTip("空目录不可下载", true);
                  return;
                }
                const { response, data } = await requestJson(`/api/share/${state.shareCode}/folder/${item.id}/size`);
                if (response.ok && data && typeof data.totalSize === 'number') {
                  const maxSize = 100 * 1024 * 1024;
                  if (data.totalSize > maxSize) {
                    showTip("目录中文件过大，请单独下载", true);
                    return;
                  }
                }
              } catch (error) {
                showTip("检查目录大小失败", true);
                return;
              }
            }
            window.open(buildDownloadUrl(isFolder ? "folder" : "file", item.id));
          };
          entryList.appendChild(row);
        });
    };

    const loadFolderEntries = async (folderId) => {
      const target = Number(folderId) || state.rootFolderId;
      const { response, data } = await requestJson(`/api/share/${state.shareCode}/entries?folderId=${encodeURIComponent(target)}`);
      if (!response.ok) {
        showTip(data.message || "加载目录失败", true);
        return;
      }
      state.currentFolderId = data.currentFolderId;
      state.rootFolderId = Number(data.rootFolderId || state.rootFolderId);
      renderBreadcrumb();
      renderEntries(data.entries || []);
    };

    const loadShare = async () => {
      state.folderDownloadableCache = new Map();
      const { response, data } = await requestJson(`/api/share/${state.shareCode}`);
      if (!response.ok) {
        showTip(data.message || "分享不存在", true);
        verifyBox.style.display = "none";
        contentBox.style.display = "none";
        return;
      }
      state.needPassword = !!data.needPassword;
      state.root = data.root || null;
      state.shareUser = data.shareUser || null;
      shareTitle.textContent = "分享文件内容:";
      shareExpire.textContent = `有效期：${data.expireLabel || "-"}`;
      if (state.shareUser) {
        const displayName = state.shareUser.name || state.shareUser.username || "用户";
        shareUserName.textContent = displayName;
        shareUser.style.display = "flex";
      } else {
        shareUser.style.display = "none";
      }
      if (state.needPassword && !data.verified) {
        verifyBox.style.display = "block";
        contentBox.style.display = "none";
        showTip("该分享已启用提取码，请先验证");
        return;
      }
      verifyBox.style.display = "none";
      contentBox.style.display = "block";
      showTip("");
      if (data.root && data.root.type === "file") {
        state.pathStack = [{ id: Number(data.root.id), name: data.root.name || "文件" }];
        renderBreadcrumb();
        renderEntries(data.entries || []);
        return;
      }
      state.rootFolderId = Number(data.root && data.root.id ? data.root.id : data.currentFolderId);
      state.currentFolderId = null;
      state.pathStack = [];
      renderBreadcrumb();
      renderEntries([{
        id: state.rootFolderId,
        type: "folder",
        name: data.root && data.root.name ? data.root.name : "目录",
        updatedAt: data.root && data.root.updatedAt ? data.root.updatedAt : null,
        createdAt: data.root && data.root.createdAt ? data.root.createdAt : null
      }]);
    };

    verifyBtn.onclick = async () => {
      const accessCode = String(verifyInput.value || "").trim();
      if (!/^[A-Za-z0-9]{4,12}$/.test(accessCode)) {
        showTip("提取码格式不合法", true);
        return;
      }
      const { response, data } = await requestJson(`/api/share/${state.shareCode}/verify`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ accessCode })
      });
      if (!response.ok) {
        showTip(data.message || "验证失败", true);
        return;
      }
      state.token = data.token || "";
      if (state.token) {
        localStorage.setItem(getTokenKey(), state.token);
      }
      showTip("验证成功");
      await loadShare();
    };

    const init = async () => {
      const pathParts = window.location.pathname.split("/").filter(Boolean);
      state.shareCode = pathParts.length > 1 ? pathParts[pathParts.length - 1] : "";
      if (!state.shareCode) {
        showTip("分享链接不合法", true);
        return;
      }
      state.token = localStorage.getItem(getTokenKey()) || "";
      await loadShare();
    };

    init();
  </script>
</body>
</html>
